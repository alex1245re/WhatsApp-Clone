<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <title>WhatsApp Clone</title>
        <meta name="description" content="">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <script src="https://cdn.socket.io/4.8.3/socket.io.min.js"></script>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div id="login-container">
            <form id="login-form">
                <h2>Identificate</h2>
                <input type="text" id="username" placeholder="Tu nombre" required autocomplete="off">
                <input type="text" id="status" placeholder="Tu estado (ej: Disponible)" required autocomplete="off">

                <p>Elige tu avatar:</p>
                <div class="avatars">
                    <label><input type="radio" name="avatar" value="👨‍💻" checked> 👨‍💻</label>
                    <label><input type="radio" name="avatar" value="👩‍💻"> 👩‍💻</label>
                    <label><input type="radio" name="avatar" value="🤖"> 🤖</label>
                    <label><input type="radio" name="avatar" value="👻"> 👻</label>
                    <label><input type="radio" name="avatar" value="🦊"> 🦊</label>
                </div>
            
            <button type="submit">Entrar al Chat</button>
            </form>
        </div>

        <div id="chat-container">
            <div id="contadorusuarios"></div>

            <ul id="messages"></ul>
            <form id="form" action="">
            <input id="input" />
            <button>Enviar</button>
        </div>
    </form>
    
        <script src="main.js"></script>
    </body>
</html>
